        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
        summary:
          type: string
        cover:
          type: string
          format: uri
        category_id:
          type: integer
        tag_ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [published, draft]
          default: draft
        is_top:
          type: boolean
          default: false

    UpdateArticleRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
        summary:
          type: string
        cover:
          type: string
          format: uri
        category_id:
          type: integer
        tag_ids:
          type: array
          items:
            type: integer
        status:
          type: string
          enum: [published, draft]
        is_top:
