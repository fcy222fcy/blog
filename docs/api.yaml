          maxLength: 50
        slug:
          type: string
          minLength: 1
          maxLength: 50
        description:
          type: string
          maxLength: 200
        icon:
          type: string
          maxLength: 10
        sort_order:
          type: integer

    UpdateCategoryRequest:
